services:
  - serviceName: ebikes-api
    testDirectory: tests
    language: python
    framework: pytest
    runtimeDetails:
      serverStartCommand: "sf project deploy start --source-dir force-app --target-org mydevorg --wait 10"
      runtime: local
    api:
      baseUrl: https://playful-bear-m8hbtf-dev-ed.trailblaze.my.salesforce.com
      authHeader: Authorization
      authType: bearer

  - serviceName: ebikes-internal-ui
    testDirectory: tests
    language: typescript
    framework: playwright
    runtimeDetails:
      serverStartCommand: ""
      runtime: local
    api:
      baseUrl: https://playful-bear-m8hbtf-dev-ed.trailblaze.lightning.force.com

  - serviceName: ebikes-external-ui
    testDirectory: tests
    language: typescript
    framework: playwright
    runtimeDetails:
      serverStartCommand: ""
      runtime: local
    api:
      baseUrl: https://playful-bear-m8hbtf-dev-ed.trailblaze.my.site.com/ebikes/s/
