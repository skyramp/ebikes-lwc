name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Salesforce source
      - 'force-app/**'
      # Tests
      - 'tests/**'
      # Build and dependency files
      - 'package.json'
      - 'sfdx-project.json'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'skyramp-testbot[bot]' }}

jobs:
  testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: skyramp/testbot@v0.6.14
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          githubToken: ${{ steps.app-token.outputs.token }}
          testDirectory: tests

          # Install Salesforce CLI, authenticate to org, and deploy source
          targetSetupCommand: |
            set -euo pipefail
            npm install -g @salesforce/cli
            echo "${SFDX_AUTH_URL}" > /tmp/sfdx_auth.txt
            sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth.txt --alias mydevorg --set-default
            rm -f /tmp/sfdx_auth.txt
            sf project deploy start --source-dir force-app --target-org mydevorg --wait 10
            ORG_URL=$(sf org display --target-org mydevorg --json | jq -r '.result.instanceUrl')
            INTERNAL_UI="${ORG_URL/trailblaze.my.salesforce.com/trailblaze.lightning.force.com}"
            EXTERNAL_UI="${ORG_URL/trailblaze.my.salesforce.com/trailblaze.my.site.com\/ebikes\/s\/}"
            echo "{\"services\": {\"ebikes-api\": {\"baseUrl\": \"${ORG_URL}\"}, \"ebikes-internal-ui\": {\"baseUrl\": \"${INTERNAL_UI}\"}, \"ebikes-external-ui\": {\"baseUrl\": \"${EXTERNAL_UI}\"}}}"

          targetReadyCheckCommand: |
            sf org display --target-org mydevorg --json | jq -e '.result.connectedStatus == "Connected"' > /dev/null

          targetReadyCheckTimeout: '120'

          # Get a fresh access token for API testing
          authTokenCommand: |
            sf org display --target-org mydevorg --json | jq -r '.result.accessToken'

          skipTargetTeardown: 'true'
